  string relationship_id = 1;

  // w:anchor — internal bookmark anchor
  string anchor = 2;

  // w:docLocation
  string doc_location = 3;

  // w:history — add to history (default: true)
  bool history = 4;

  // Tooltip
  string tooltip = 5;

  // Content (runs, SDTs, etc.)
  repeated ParagraphChild content = 6;
}


// ============================================================================
// TABLE (w:tbl)
// ============================================================================

message Table {
  // w:tblPr
  TableProperties properties = 1;

  // w:tblGrid
  TableGrid grid = 2;

  // Rows and bookmarks/etc. at table level
  repeated TableChild content = 3;
}

message TableChild {
  oneof child {
    TableRow row = 1;
    BookmarkStart bookmark_start = 2;
    BookmarkEnd bookmark_end = 3;
    TrackedChangeInsertion ins = 4;
    TrackedChangeDeletion del = 5;
    CommentRangeStart comment_range_start = 6;
    CommentRangeEnd comment_range_end = 7;
  }
}

// w:tblPr
message TableProperties {
  // w:tblStyle — named table style
  string style_id = 1;

  // w:tblpPr — floating table positioning
  TablePositionProperties tblp_pr = 2;

  // w:tblOverlap
  TableOverlapValue tbl_overlap = 3;

  // w:bidiVisual
  OnOffElement bidi_visual = 4;

  // w:tblStyleRowBandSize
  int32 style_row_band_size = 5;

  // w:tblStyleColBandSize
  int32 style_col_band_size = 6;

  // w:tblW — preferred table width
  TableWidth width = 7;

  // w:jc — table alignment
  JustificationValue jc = 8;

  // w:tblCellSpacing — cell spacing
  TableWidth cell_spacing = 9;

  // w:tblInd — table indent from margin
  TableWidth ind = 10;

  // w:tblBorders
  TableBorders borders = 11;

  // w:shd — table-level shading
  DocxShading shading = 12;

  // w:tblLayout — table layout algorithm
  TableLayout layout = 13;

  // w:tblCellMar — default cell margins
  TableCellMargins cell_margins = 14;

  // w:tblLook — conditional formatting application flags
  TableLook look = 15;

  // w:tblCaption
  string caption = 16;

  // w:tblDescription
  string description = 17;

  // Change tracking for table properties
  TablePropertiesChange tbl_pr_change = 18;
}

message TablePropertiesChange {
  int32 id = 1;
  string author = 2;
  string date = 3;
  TableProperties old_tbl_pr = 4;
}

message TablePositionProperties {
  int32 left_from_text = 1;   // DXA
  int32 right_from_text = 2;
  int32 top_from_text = 3;
  int32 bottom_from_text = 4;
  int32 vert_anchor = 5;
  int32 horz_anchor = 6;
  int32 tbl_p_x = 7;    // DXA
  int32 tbl_p_y = 8;
  TablePositionX tbl_p_x_spec = 9;
  TablePositionY tbl_p_y_spec = 10;
}

enum TablePositionX {
  TABLE_POS_X_CENTER = 0;
  TABLE_POS_X_INSIDE = 1;
  TABLE_POS_X_LEFT = 2;
  TABLE_POS_X_OUTSIDE = 3;
  TABLE_POS_X_RIGHT = 4;
}

enum TablePositionY {
  TABLE_POS_Y_BOTTOM = 0;
  TABLE_POS_Y_CENTER = 1;
  TABLE_POS_Y_INLINE = 2;
  TABLE_POS_Y_INSIDE = 3;
  TABLE_POS_Y_OUTSIDE = 4;
  TABLE_POS_Y_TOP = 5;
}

enum TableOverlapValue {
  TABLE_OVERLAP_NEVER = 0;
  TABLE_OVERLAP_OVERLAP = 1;
}

// w:tblW, used for multiple width-type attributes
message TableWidth {
  TableWidthType type = 1;
  int32 w = 2;   // DXA for "dxa", percentage * 50 for "pct", 0 for "auto" / "nil"
}

enum TableWidthType {
  TABLE_WIDTH_NIL = 0;
  TABLE_WIDTH_AUTO = 1;
  TABLE_WIDTH_DXA = 2;
  TABLE_WIDTH_PCT = 3;   // Fiftieths of a percent
}

message TableGrid {
  repeated TableGridColumn columns = 1;
  TableGridChange grid_change = 2;
}

message TableGridColumn {
  int32 w = 1;  // DXA
}

message TableGridChange {
  int32 id = 1;
  string author = 2;
  string date = 3;
  TableGrid original_grid = 4;
}

message TableBorders {
  TableBorder top = 1;
  TableBorder left = 2;
  TableBorder bottom = 3;
  TableBorder right = 4;
  TableBorder inside_h = 5;
  TableBorder inside_v = 6;
}

message TableBorder {
  BorderStyle style = 1;
  DocxColor color = 2;
  int32 size = 3;    // Eighths of a point
  int32 space = 4;   // Points
  bool shadow = 5;
  bool frame = 6;
}

message TableLayout {
  TableLayoutType type = 1;
}

enum TableLayoutType {
  TABLE_LAYOUT_AUTOFIT = 0;
  TABLE_LAYOUT_FIXED = 1;
}

message TableCellMargins {
  TableWidth top = 1;
  TableWidth left = 2;
  TableWidth bottom = 3;
  TableWidth right = 4;
}

// w:tblLook — 16-bit bitfield governing which conditional formats are active
message TableLook {
  bool first_row = 1;
  bool last_row = 2;
  bool first_column = 3;
  bool last_column = 4;
  bool no_h_band = 5;
  bool no_v_band = 6;
  string val = 7;  // Raw hex value, e.g. "04A0"
}

// ============================================================================
// TABLE ROW (w:tr)
// ============================================================================

message TableRow {
  // w:trPr
  TableRowProperties properties = 1;

  // Cells and markup within the row
  repeated TableRowChild content = 2;

  // w:rsidR, etc.
  RevisionSaveIds rsid = 3;
}

message TableRowChild {
  oneof child {
    TableCell cell = 1;
    BookmarkStart bookmark_start = 2;
    BookmarkEnd bookmark_end = 3;
    TrackedChangeInsertion ins = 4;
    TrackedChangeDeletion del = 5;
    CommentRangeStart comment_range_start = 6;
    CommentRangeEnd comment_range_end = 7;
  }
}

// w:trPr
message TableRowProperties {
  // w:cnfStyle — conditional formatting style bits (12-bit hex string)
  string cnf_style = 1;

  // w:divId
  int32 div_id = 2;

  // w:gridBefore / w:gridAfter — skipped grid columns
  int32 grid_before = 3;
  int32 grid_after = 4;

  // w:wBefore / w:wAfter — width consumed by skipped columns
  TableWidth w_before = 5;
  TableWidth w_after = 6;

  // w:cantSplit — row cannot be split across pages
  OnOffElement cant_split = 7;

  // w:trHeight
  TableRowHeight tr_height = 8;

  // w:tblHeader — repeat row as table header
  OnOffElement tbl_header = 9;

  // w:tblCellSpacing
  TableWidth cell_spacing = 10;

  // w:jc
  JustificationValue jc = 11;

  // w:hidden
  OnOffElement hidden = 12;

  // Change tracking for row properties
  TableRowPropertiesChange trpr_change = 13;

  // Tracked row insertion/deletion
  TrackedChangeInfo ins = 14;
  TrackedChangeInfo del = 15;
}

message TableRowPropertiesChange {
  int32 id = 1;
  string author = 2;
  string date = 3;
  TableRowProperties old_trpr = 4;
}

message TableRowHeight {
  int32 val = 1;           // DXA
  HeightRule h_rule = 2;
}

enum HeightRule {
  HEIGHT_RULE_AUTO = 0;
  HEIGHT_RULE_AT_LEAST = 1;
  HEIGHT_RULE_EXACT = 2;
}


// ============================================================================
// TABLE CELL (w:tc)
// ============================================================================

message TableCell {
  // w:tcPr
  TableCellProperties properties = 1;

  // Block-level content within the cell
  repeated BlockLevelElement content = 2;
}

// w:tcPr
message TableCellProperties {
  // w:cnfStyle
  string cnf_style = 1;

  // w:tcW — preferred cell width
  TableWidth width = 2;

  // w:gridSpan — number of grid columns this cell spans
  int32 grid_span = 3;

  // w:hMerge — horizontal merge
  HorizontalMerge h_merge = 4;

  // w:vMerge — vertical merge
  VerticalMerge v_merge = 5;

  // w:tcBorders
  TableCellBorders borders = 6;

  // w:shd
  DocxShading shading = 7;

  // w:noWrap
  OnOffElement no_wrap = 8;

  // w:tcMar — cell-level margins (override table default)
  TableCellMargins margins = 9;

  // w:textDirection
  TextDirectionValue text_direction = 10;

  // w:tcFitText
  OnOffElement fit_text = 11;

  // w:vAlign — vertical alignment
  VerticalAlignValue v_align = 12;

  // w:hideMark — suppress paragraph mark contribution to row height
  OnOffElement hide_mark = 13;

  // w:headers — list of header cell IDs (accessibility)
  repeated string headers = 14;

  // Change tracking for cell properties
  TableCellPropertiesChange tcpr_change = 15;
}

message TableCellPropertiesChange {
  int32 id = 1;
  string author = 2;
  string date = 3;
  TableCellProperties old_tcpr = 4;
}

enum HorizontalMerge {
  H_MERGE_NONE = 0;
  H_MERGE_RESTART = 1;   // First cell in merge group (w:hMerge w:val="restart")
  H_MERGE_CONTINUE = 2;  // Continuation cell (w:hMerge with no val)
}

enum VerticalMerge {
  V_MERGE_NONE = 0;
  V_MERGE_RESTART = 1;
  V_MERGE_CONTINUE = 2;
}

enum VerticalAlignValue {
  V_ALIGN_TOP = 0;
  V_ALIGN_CENTER = 1;
  V_ALIGN_BOTTOM = 2;
}

message TableCellBorders {
  TableBorder top = 1;
  TableBorder left = 2;
  TableBorder bottom = 3;
  TableBorder right = 4;
  TableBorder inside_h = 5;
  TableBorder inside_v = 6;
  TableBorder tl_2_br = 7;   // Diagonal top-left to bottom-right
  TableBorder tr_2_bl = 8;   // Diagonal top-right to bottom-left
}


// ============================================================================
// SECTION PROPERTIES (w:sectPr)
// ============================================================================

message SectionProperties {
  // w:footnotePr — footnote properties for this section
  SectionFootnotePr footnote_pr = 1;

  // w:endnotePr
  SectionEndnotePr endnote_pr = 2;

  // w:type — section break type
  SectionType type = 3;

  // w:pgSz — page size
  PageSize pg_sz = 4;

  // w:pgMar — page margins
  PageMargin pg_mar = 5;

  // w:paperSrc — paper source (printer tray IDs)
  PaperSource paper_src = 6;

  // w:pgBorders — page borders
  PageBorders pg_borders = 7;

  // w:lnNumType — line numbering
  LineNumbering ln_num_type = 8;

  // w:pgNumType — page numbering
  PageNumbering pg_num_type = 9;

  // w:cols — multi-column layout
  Columns cols = 10;

  // w:formProt — document protection for this section
  OnOffElement form_prot = 11;

  // w:vAlign — vertical page alignment
  VerticalAlignValue v_align = 12;

  // w:noEndnote
  OnOffElement no_endnote = 13;

  // w:titlePg — different first page header/footer
  OnOffElement title_pg = 14;

  // w:textDirection
  TextDirectionValue text_direction = 15;

  // w:bidi
  OnOffElement bidi = 16;

  // w:rtlGutter
  OnOffElement rtl_gutter = 17;

  // w:docGrid — document grid
  DocumentGrid doc_grid = 18;

  // w:printerSettings relationship ID
  string printer_settings_rid = 19;

  // Header/footer references
  repeated HeaderReference header_references = 20;
  repeated FooterReference footer_references = 21;

  // w:sectPrChange — change tracking
  SectionPropertiesChange sect_pr_change = 22;

  // r:id — for sub-document references
  string relationship_id = 23;
}

enum SectionType {
  SECTION_NEXT_PAGE = 0;
  SECTION_NEXT_COLUMN = 1;
  SECTION_CONTINUOUS = 2;
  SECTION_EVEN_PAGE = 3;
  SECTION_ODD_PAGE = 4;
}

message PageSize {
  int32 w = 1;      // DXA
  int32 h = 2;      // DXA
  PageOrientation orient = 3;
  int32 code = 4;   // Paper code (1 = Letter, 9 = A4, etc.)
}

enum PageOrientation {
  PAGE_ORIENT_PORTRAIT = 0;
  PAGE_ORIENT_LANDSCAPE = 1;
}

message PageMargin {
  int32 top = 1;      // DXA
  int32 right = 2;
  int32 bottom = 3;
  int32 left = 4;
  int32 header = 5;   // DXA — distance from paper edge to header
  int32 footer = 6;   // DXA
  int32 gutter = 7;
}

message PaperSource {
  int32 first = 1;
  int32 other = 2;
}

message PageBorders {
  PageBorderDisplay display = 1;
  PageBorderOffset offset_from = 2;
  bool z_order_front = 3;
  PageBorderBorder top = 4;
  PageBorderBorder left = 5;
  PageBorderBorder bottom = 6;
  PageBorderBorder right = 7;
}

enum PageBorderDisplay {
  PAGE_BORDER_ALL_PAGES = 0;
  PAGE_BORDER_FIRST_PAGE = 1;
  PAGE_BORDER_NOT_FIRST_PAGE = 2;
}

enum PageBorderOffset {
  PAGE_BORDER_OFFSET_PAGE = 0;
  PAGE_BORDER_OFFSET_TEXT = 1;
}

message PageBorderBorder {
  BorderStyle style = 1;
  DocxColor color = 2;
  int32 size = 3;
  int32 space = 4;
  bool shadow = 5;
  bool frame = 6;
  // Art border (numbered reference into border art table)
  int32 art = 7;
}

message LineNumbering {
  LineNumberingRestartValue restart = 1;
  int32 line_starting_number = 2;
  int32 distance = 3;    // DXA — distance from text
  int32 count_by = 4;    // Number interval
}

enum LineNumberingRestartValue {
  LINE_NUM_RESTART_NEW_PAGE = 0;
  LINE_NUM_RESTART_NEW_SECTION = 1;
  LINE_NUM_RESTART_CONTINUOUS = 2;
}

message PageNumbering {
  NumberingFormat fmt = 1;
  int32 start = 2;
  string chapter_separator = 3;
  int32 chapter_style = 4;
}

message Columns {
  int32 num = 1;
  int32 space = 2;         // DXA — default spacing between columns
  bool equal_width = 3;
  bool separate = 4;       // Draw separator line between columns
  repeated Column col = 5;
}

message Column {
  int32 w = 1;      // DXA
  int32 space = 2;  // DXA — trailing space after this column
}

message DocumentGrid {
  DocumentGridType type = 1;
  int32 line_pitch = 2;   // Hundredths of a point
  int32 char_space = 3;   // Hundredths of a character width
}

enum DocumentGridType {
  DOC_GRID_DEFAULT = 0;
  DOC_GRID_LINES = 1;
  DOC_GRID_LINES_AND_CHARS = 2;
  DOC_GRID_SNAP_TO_CHARS = 3;
}

message HeaderReference {
  HeaderFooterType type = 1;
  string relationship_id = 2;
}

message FooterReference {
  HeaderFooterType type = 1;
  string relationship_id = 2;
}

enum HeaderFooterType {
  HF_DEFAULT = 0;
  HF_EVEN = 1;
  HF_FIRST = 2;
}

message SectionPropertiesChange {
  int32 id = 1;
  string author = 2;
  string date = 3;
  SectionProperties old_sect_pr = 4;
}

message SectionFootnotePr {
  NumberingFormat num_fmt = 1;
  int32 num_start = 2;
  RestartNumber num_restart = 3;
  FootnotePosition pos = 4;
}

message SectionEndnotePr {
  NumberingFormat num_fmt = 1;
  int32 num_start = 2;
  RestartNumber num_restart = 3;
  EndnotePosition pos = 4;
}

enum FootnotePosition {
  FOOTNOTE_POS_PAGE_BOTTOM = 0;
  FOOTNOTE_POS_BELOW_TEXT = 1;
}

enum EndnotePosition {
  ENDNOTE_POS_SECTION_END = 0;
  ENDNOTE_POS_DOC_END = 1;
}

enum RestartNumber {
  RESTART_CONTINUOUS = 0;
  RESTART_EACH_SECTION = 1;
  RESTART_EACH_PAGE = 2;
}


// ============================================================================
// TRACKED CHANGES
// ============================================================================

message TrackedChangeInfo {
  int32 id = 1;
  string author = 2;
  string date = 3;     // ISO 8601
}

