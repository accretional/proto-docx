// OpenDOCX Protocol Buffer Schema
// A technically faithful representation of the OOXML WordprocessingML (.docx)
// file format as defined in ECMA-376 / ISO/IEC 29500 (Office Open XML).
//
// Namespace mapping:
//   w:  = http://schemas.openxmlformats.org/wordprocessingml/2006/main
//   r:  = http://schemas.openxmlformats.org/officeDocument/2006/relationships
//   wp: = http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing
//   a:  = http://schemas.openxmlformats.org/drawingml/2006/main
//   pic:= http://schemas.openxmlformats.org/drawingml/2006/picture
//   mc: = http://schemas.openxmlformats.org/markup-compatibility/2006
//   v:  = urn:schemas-microsoft-com:vml
//   o:  = urn:schemas-microsoft-com:office:office
//
// Units:
//   DXA   = twentieths of a point (1 inch = 1440 DXA)
//   EMU   = English Metric Units (1 inch = 914400 EMU)
//   HPC   = half-points (1pt = 2 HPC)
//   Twips = 1/20th of a point (same as DXA in this context)
//
// This schema follows proto3 syntax. All optional fields use wrapper types or
// oneof constructs where the OOXML spec uses XML attribute presence to signal
// defaults vs. explicit values.

syntax = "proto3";

package openformat.v1;

// go_package is set to proto-docx's own module so that generated DOCX
// types live alongside proto-docx (not inside proto-xml).  The imported
// mime.proto is remapped to proto-xml's generated package at protoc time
// via `--go_opt=Mopenformat/v1/mime.proto=openformat/gen/go/openformat/v1`.
option go_package = "openformat-docx/gen/go/openformat/v1;openformatdocxv1";

import "openformat/v1/mime.proto";


// ============================================================================
// TOP-LEVEL PACKAGE
// Represents the entire .docx ZIP package and its parts.
// ============================================================================

// The root message representing a complete .docx package.
message Package {
  // The main document part: word/document.xml
  Document document = 1;

  // Shared styles: word/styles.xml
  Styles styles = 2;

  // Numbering definitions: word/numbering.xml
  Numbering numbering = 3;

  // Document settings: word/settings.xml
  Settings settings = 4;

  // Web settings: word/webSettings.xml
  WebSettings web_settings = 5;

  // Font table: word/fontTable.xml
  FontTable font_table = 6;

  // Theme: word/theme/theme1.xml
  Theme theme = 7;

  // Footnotes part: word/footnotes.xml
  FootnotesPart footnotes_part = 8;

  // Endnotes part: word/endnotes.xml
  EndnotesPart endnotes_part = 9;

  // Comments part: word/comments.xml
  CommentsPart comments_part = 10;

  // Header parts: word/header1.xml, header2.xml, etc.
  repeated HeaderPart header_parts = 11;

  // Footer parts: word/footer1.xml, footer2.xml, etc.
  repeated FooterPart footer_parts = 12;

  // Custom XML parts
  repeated CustomXmlPart custom_xml_parts = 13;

  // Embedded objects and media
  repeated MediaPart media_parts = 14;

  // Glossary document: word/glossary/document.xml
  GlossaryDocument glossary_document = 15;

  // Package relationships (_rels/.rels)
  repeated Relationship package_relationships = 16;

  // Content types ([Content_Types].xml)
  ContentTypes content_types = 17;
}

// [Content_Types].xml
message ContentTypes {
  repeated ContentTypeDefault defaults = 1;
  repeated ContentTypeOverride overrides = 2;
}

message ContentTypeDefault {
  string extension = 1;
  string content_type = 2;
}

message ContentTypeOverride {
  string part_name = 1;
  string content_type = 2;
}

// OPC Relationship
message Relationship {
  string id = 1;       // rId1, rId2, ...
  string type = 2;     // Full relationship type URI
  string target = 3;   // Relative or absolute path
  TargetMode target_mode = 4;
}

enum TargetMode {
  TARGET_MODE_INTERNAL = 0;
  TARGET_MODE_EXTERNAL = 1;
}

// Media (images, embedded objects)
message MediaPart {
  string relationship_id = 1;
  string filename = 2;
  string content_type = 3;
  bytes data = 4;
}

// Custom XML part
message CustomXmlPart {
  string relationship_id = 1;
  string item_id = 2;           // GUID
  bytes xml_data = 3;
  bytes schema_data = 4;
}


// ============================================================================
// DOCUMENT (word/document.xml)
// w:document
// ============================================================================

message Document {
  // w:document attributes
  bool conform_ance_strict = 1;  // w:conformance = "strict" vs "transitional"

  // w:body — the main content container
  Body body = 2;

  // Markup compatibility attributes (mc:Ignorable etc.)
  MarkupCompatibility markup_compatibility = 3;
}

// mc:AlternateContent / mc:Ignorable markup compatibility (OOXML §15.2.5)
message MarkupCompatibility {
  // mc:Ignorable — space-separated list of namespace prefixes to ignore
  string ignorable = 1;
  // mc:ProcessContent — prefixes whose unrecognised children may be processed
  string process_content = 2;
}

// w:body
message Body {
  // Body-level block content: paragraphs, tables, SDTs, section properties
  repeated BlockLevelElement content = 1;

  // w:sectPr — the final (document-level) section properties
  // If present, this is the last element in the body
  SectionProperties section_properties = 2;
}

// Discriminated union of block-level elements that can appear in w:body,
// w:tc (table cell), w:txbxContent, etc.
message BlockLevelElement {
  oneof element {
    Paragraph paragraph = 1;
    Table table = 2;
    StructuredDocumentTag sdt = 3;
    CustomXmlElement custom_xml = 4;
    SectionProperties sect_pr = 5;        // mid-body sectPr (section break)
    BookmarkStart bookmark_start = 6;
    BookmarkEnd bookmark_end = 7;
    PermStart perm_start = 8;
    PermEnd perm_end = 9;
    ProofErr proof_err = 10;
    MoveFromRangeStart move_from_range_start = 11;
    MoveFromRangeEnd move_from_range_end = 12;
    MoveToRangeStart move_to_range_start = 13;
    MoveToRangeEnd move_to_range_end = 14;
    CommentRangeStart comment_range_start = 15;
    CommentRangeEnd comment_range_end = 16;
    AltChunk alt_chunk = 17;
  }
}


// ============================================================================
// PARAGRAPH (w:p)
// ============================================================================

message Paragraph {
  // w:pPr — paragraph properties
  ParagraphProperties properties = 1;

  // w:p children: runs, hyperlinks, bookmarks, tracked changes, fields, etc.
  repeated ParagraphChild content = 2;

  // w:rsidR, w:rsidRPr, w:rsidDel, w:rsidDefault
  RevisionSaveIds rsid = 3;
}

// Paragraph-level content discriminant
message ParagraphChild {
  oneof child {
    Run run = 1;
    Hyperlink hyperlink = 2;
    BookmarkStart bookmark_start = 3;
    BookmarkEnd bookmark_end = 4;
    CommentRangeStart comment_range_start = 5;
    CommentRangeEnd comment_range_end = 6;
    TrackedChangeInsertion ins = 7;
    TrackedChangeDeletion del = 8;
    TrackedChangeMoveFrom move_from = 9;
    TrackedChangeMoveTo move_to = 10;
    ProofErr proof_err = 11;
    FieldCharRun fld_char = 12;
    FieldInstrRun fld_instr = 13;
    StructuredDocumentTag sdt = 14;
    CustomXmlElement custom_xml = 15;
    PermStart perm_start = 16;
    PermEnd perm_end = 17;
    RunLevelSmartTag smart_tag = 18;
    BidirectionalOverride bdo = 19;
    BidirectionalEmbedding dir = 20;
    Subheading subDoc = 21;
  }
}

// w:pPr — Paragraph Properties
message ParagraphProperties {
  // w:pStyle — named style reference
  string style_id = 1;

  // w:keepNext — keep with next paragraph
  OnOffElement keep_next = 2;

  // w:keepLines — keep all lines together
  OnOffElement keep_lines = 3;

  // w:pageBreakBefore
  OnOffElement page_break_before = 4;

  // w:framePr — text frame properties
  FrameProperties frame_pr = 5;

  // w:widowControl
  OnOffElement widow_control = 6;

  // w:numPr — list/numbering reference
  NumberingProperties num_pr = 7;

  // w:suppressLineNumbers
  OnOffElement suppress_line_numbers = 8;

  // w:pBdr — paragraph borders
  ParagraphBorders borders = 9;

  // w:shd — paragraph shading
  DocxShading shading = 10;

  // w:tabs — custom tab stops
  Tabs tabs = 11;

  // w:suppressAutoHyphens
  OnOffElement suppress_auto_hyphens = 12;

  // w:kinsoku — kinsoku line breaking
  OnOffElement kinsoku = 13;

  // w:wordWrap
  OnOffElement word_wrap = 14;

  // w:overflowPunct
  OnOffElement overflow_punct = 15;

  // w:topLinePunct
  OnOffElement top_line_punct = 16;

  // w:autoSpaceDE — auto space between CJK and Latin text
  OnOffElement auto_space_de = 17;

  // w:autoSpaceDN — auto space between CJK text and numbers
  OnOffElement auto_space_dn = 18;

  // w:bidi — right-to-left paragraph
  OnOffElement bidi = 19;

  // w:adjustRightInd
  OnOffElement adjust_right_ind = 20;

  // w:snapToGrid
  OnOffElement snap_to_grid = 21;

  // w:spacing
  ParagraphSpacing spacing = 22;

  // w:ind — indentation
  ParagraphIndentation ind = 23;

  // w:contextualSpacing — suppress spacing between same-style paragraphs
  OnOffElement contextual_spacing = 24;

  // w:mirrorIndents
  OnOffElement mirror_indents = 25;

  // w:suppressOverlap
  OnOffElement suppress_overlap = 26;

  // w:jc — justification/alignment
  JustificationValue jc = 27;

  // w:textDirection
  TextDirectionValue text_direction = 28;

  // w:textAlignment — vertical text alignment within line
  TextAlignmentValue text_alignment = 29;

  // w:textboxTightWrap
  TextboxTightWrapValue textbox_tight_wrap = 30;

  // w:outlineLvl — outline level (0-8, 9 = body text)
  int32 outline_lvl = 31;

  // w:divId
  int32 div_id = 32;

  // w:cnfStyle — conditional formatting style bits
  string cnf_style = 33;

  // w:rPr — run properties applied to the paragraph mark
  RunProperties rpr = 34;

  // w:sectPr — section properties (inline; causes section break)
  SectionProperties sect_pr = 35;

  // Change tracking for paragraph properties (w:pPrChange)
  ParagraphPropertiesChange ppr_change = 36;
}

message ParagraphPropertiesChange {
  int32 id = 1;
  string author = 2;
  string date = 3;  // ISO 8601
  ParagraphProperties old_ppr = 4;
}

message ParagraphSpacing {
  // w:spacing w:before (DXA)
  int32 before = 1;

  // w:spacing w:beforeLines (hundredths of a line)
  int32 before_lines = 2;

  // w:spacing w:beforeAutospacing
  bool before_autospacing = 3;

  // w:spacing w:after (DXA)
  int32 after = 4;

  // w:spacing w:afterLines (hundredths of a line)
  int32 after_lines = 5;

  // w:spacing w:afterAutospacing
  bool after_autospacing = 6;

  // w:spacing w:line (DXA or line units, depending on lineRule)
  int32 line = 7;

  // w:spacing w:lineRule
  LineSpacingRule line_rule = 8;
}

enum LineSpacingRule {
  LINE_SPACING_AUTO = 0;       // w:auto
  LINE_SPACING_EXACT = 1;      // w:exact
  LINE_SPACING_AT_LEAST = 2;   // w:atLeast
}

message ParagraphIndentation {
  // w:ind w:left (DXA) — can also be expressed as w:start for bidi
  int32 left = 1;
  int32 left_chars = 2;   // hundredths of a character width

  // w:ind w:right / w:end (DXA)
  int32 right = 3;
  int32 right_chars = 4;

  // w:ind w:hanging (DXA)
  int32 hanging = 5;
  int32 hanging_chars = 6;

  // w:ind w:firstLine (DXA) — mutually exclusive with hanging
  int32 first_line = 7;
  int32 first_line_chars = 8;
}

message NumberingProperties {
  // w:ilvl — zero-based indent level (0–8)
  int32 ilvl = 1;

  // w:numId — reference into w:numbering > w:num
  int32 num_id = 2;

  // w:ins — tracked insertion of numbering
  TrackedChangeInfo ins = 3;
}

message ParagraphBorders {
  ParagraphBorder top = 1;
  ParagraphBorder left = 2;
  ParagraphBorder bottom = 3;
  ParagraphBorder right = 4;
  ParagraphBorder between = 5;
  ParagraphBorder bar = 6;
}

message ParagraphBorder {
  BorderStyle style = 1;
  int32 color = 2;       // RGB as 24-bit int (0xRRGGBB), or -1 for "auto"
  ThemeColor theme_color = 3;
  int32 theme_tint = 4;
  int32 theme_shade = 5;
  int32 size = 6;        // Eighths of a point
  int32 space = 7;       // Points of spacing
  bool shadow = 8;
  bool frame = 9;
}

message Tabs {
  repeated TabStop tab_stops = 1;
}

message TabStop {
  TabStopType type = 1;
  int32 pos = 2;         // DXA
  TabLeader leader = 3;
}

enum TabStopType {
  TAB_STOP_CLEAR = 0;
  TAB_STOP_LEFT = 1;
  TAB_STOP_CENTER = 2;
  TAB_STOP_RIGHT = 3;
  TAB_STOP_DECIMAL = 4;
  TAB_STOP_BAR = 5;
  TAB_STOP_NUM = 6;
}

enum TabLeader {
  TAB_LEADER_NONE = 0;
  TAB_LEADER_DOT = 1;
  TAB_LEADER_HEAVY = 2;
  TAB_LEADER_HYPHEN = 3;
  TAB_LEADER_MIDDLE_DOT = 4;
  TAB_LEADER_UNDERSCORE = 5;
}

enum JustificationValue {
  JC_START = 0;         // w:start (logical start / left for LTR)
  JC_END = 1;           // w:end
  JC_LEFT = 2;          // w:left
  JC_CENTER = 3;        // w:center
  JC_RIGHT = 4;         // w:right
  JC_BOTH = 5;          // w:both (justified)
  JC_MEDIUM_KASHIDA = 6;
  JC_DISTRIBUTE = 7;
  JC_NUM_TAB = 8;
  JC_HIGH_KASHIDA = 9;
  JC_LOW_KASHIDA = 10;
  JC_THAI_DISTRIBUTE = 11;
}

enum TextDirectionValue {
  TEXT_DIR_LR = 0;
  TEXT_DIR_RL = 1;
  TEXT_DIR_LR_TB = 2;
  TEXT_DIR_TB_LR = 3;
  TEXT_DIR_TB_RL = 4;
  TEXT_DIR_BTT_LR = 5;
  TEXT_DIR_LR_TB_V = 6;
  TEXT_DIR_TB_LR_V = 7;
}

enum TextAlignmentValue {
  TEXT_ALIGN_AUTO = 0;
  TEXT_ALIGN_TOP = 1;
  TEXT_ALIGN_CENTER = 2;
  TEXT_ALIGN_BASELINE = 3;
  TEXT_ALIGN_BOTTOM = 4;
}

enum TextboxTightWrapValue {
  TEXTBOX_NONE = 0;
  TEXTBOX_ALL_LINES = 1;
  TEXTBOX_FIRST_AND_LAST_LINE = 2;
  TEXTBOX_FIRST_LINE_ONLY = 3;
  TEXTBOX_LAST_LINE_ONLY = 4;
}


// ============================================================================
// RUN (w:r)
// ============================================================================

message Run {
  // w:rPr — run-level formatting
  RunProperties properties = 1;

  // Run content children
  repeated RunChild content = 2;

  // w:rsidDel, w:rsidR, w:rsidRPr
  RevisionSaveIds rsid = 3;
}

// Discriminant for elements that can appear inside w:r
message RunChild {
  oneof child {
    TextContent text = 1;               // w:t
    DeletedText del_text = 2;           // w:delText (inside w:del)
    FieldChar field_char = 3;           // w:fldChar
    FieldInstrText instr_text = 4;      // w:instrText
    Break br = 5;                       // w:br
    Drawing drawing = 6;               // w:drawing
    Picture picture = 7;               // w:pict (legacy VML)
    NoBreakHyphen no_break_hyphen = 8; // w:noBreakHyphen
    SoftHyphen soft_hyphen = 9;        // w:softHyphen
    DayShort day_short = 10;           // w:dayShort
    DayLong day_long = 11;             // w:dayLong
    MonthShort month_short = 12;       // w:monthShort
    MonthLong month_long = 13;         // w:monthLong
    YearShort year_short = 14;         // w:yearShort
    YearLong year_long = 15;           // w:yearLong
    AnnotationRef annotation_ref = 16; // w:annotationRef
    FootnoteRef footnote_ref = 17;     // w:footnoteRef
    EndnoteRef endnote_ref = 18;       // w:endnoteRef
    Separator separator = 19;          // w:separator
    ContinuationSeparator cont_sep = 20; // w:continuationSeparator
    SymbolChar symbol = 21;            // w:sym
    PgNum pg_num = 22;                 // w:pgNum (legacy)
    CarriageReturn cr = 23;            // w:cr
    Tab tab = 24;                      // w:tab
    LastRenderedPageBreak last_rendered_page_break = 25;
    CommentReference comment_ref = 26; // w:commentReference
    FootnoteReference footnote_reference = 27; // w:footnoteReference
    EndnoteReference endnote_reference = 28;   // w:endnoteReference
    Object object = 29;               // w:object
    Ruby ruby = 30;                   // w:ruby (phonetic guide)
    EastAsianLayout east_asian_layout = 31; // w:eastAsianLayout (inside rPr but can carry content)
  }
}

// w:t — literal text content of a run
message TextContent {
  string value = 1;
  // xml:space="preserve" — must be set when leading/trailing whitespace present
  bool preserve_space = 2;
}

message DeletedText {
  string value = 1;
  bool preserve_space = 2;
}

message FieldInstrText {
  string value = 1;
  bool preserve_space = 2;
}

// w:br — break
message Break {
  BreakType type = 1;
  BreakClear clear = 2;  // Only meaningful when type = TEXT_WRAPPING
}

enum BreakType {
  BREAK_PAGE = 0;
  BREAK_COLUMN = 1;
  BREAK_TEXT_WRAPPING = 2;
}

enum BreakClear {
  BREAK_CLEAR_NONE = 0;
  BREAK_CLEAR_LEFT = 1;
  BREAK_CLEAR_RIGHT = 2;
  BREAK_CLEAR_ALL = 3;
}

// w:fldChar
message FieldChar {
  FieldCharType field_char_type = 1;
  bool dirty = 2;
  bool lock = 3;
  // w:ffData — form field data (only in BEGIN)
  FormFieldData ff_data = 4;
}

enum FieldCharType {
  FIELD_CHAR_BEGIN = 0;
  FIELD_CHAR_SEPARATE = 1;
  FIELD_CHAR_END = 2;
}

message FormFieldData {
  string name = 1;
  bool enabled = 2;
  string calculate_on_exit = 3;
  string entry_macro = 4;
  string exit_macro = 5;
  string help_text = 6;
  string status_text = 7;

  oneof specific {
    TextFormField text_input = 8;
    CheckBoxFormField check_box = 9;
    DropDownFormField drop_down = 10;
  }
}

message TextFormField {
  TextFormFieldType type = 1;
  string default_value = 2;
  int32 max_length = 3;
  string format = 4;
}

enum TextFormFieldType {
  TEXT_FORM_REGULAR = 0;
  TEXT_FORM_NUMBER = 1;
  TEXT_FORM_DATE = 2;
  TEXT_FORM_CURRENT_TIME = 3;
  TEXT_FORM_CURRENT_DATE = 4;
  TEXT_FORM_CALCULATED = 5;
}

message CheckBoxFormField {
  oneof size_spec {
    int32 size = 1;      // HPC
    bool auto = 2;
  }
  bool default_value = 3;
  bool checked = 4;
}

message DropDownFormField {
  string default_value = 1;
  int32 result = 2;
  repeated string list_entry = 3;
}

// w:sym
message SymbolChar {
  string font = 1;
  int32 char_code = 2;  // Unicode code point (hex in XML)
}

// Placeholder messages for simple empty elements
message NoBreakHyphen {}
message SoftHyphen {}
message DayShort {}
message DayLong {}
message MonthShort {}
message MonthLong {}
message YearShort {}
message YearLong {}
message AnnotationRef {}
message FootnoteRef {}
message EndnoteRef {}
message Separator {}
message ContinuationSeparator {}
message PgNum {}
message CarriageReturn {}
message Tab {}
message LastRenderedPageBreak {}

message CommentReference {
  int32 id = 1;
}

message FootnoteReference {
  int32 id = 1;
  bool custom_mark_follows = 2;
}

message EndnoteReference {
  int32 id = 1;
  bool custom_mark_follows = 2;
}


// ============================================================================
// RUN PROPERTIES (w:rPr)
// ============================================================================

message RunProperties {
  // w:rStyle — named character style
  string style_id = 1;

  // w:rFonts — font specification
  RunFonts fonts = 2;

  // w:b — bold
  OnOffElement bold = 3;

  // w:bCs — complex script bold
  OnOffElement bold_cs = 4;

  // w:i — italic
  OnOffElement italic = 5;

  // w:iCs
  OnOffElement italic_cs = 6;

  // w:caps — all caps
  OnOffElement caps = 7;

  // w:smallCaps
  OnOffElement small_caps = 8;

  // w:strike — single strikethrough
  OnOffElement strike = 9;

  // w:dstrike — double strikethrough
  OnOffElement dstrike = 10;

  // w:outline
  OnOffElement outline = 11;

  // w:shadow
  OnOffElement shadow = 12;

  // w:emboss
  OnOffElement emboss = 13;

  // w:imprint — engraved
  OnOffElement imprint = 14;

  // w:noProof — suppress spelling and grammar
  OnOffElement no_proof = 15;

  // w:snapToGrid
  OnOffElement snap_to_grid = 16;

  // w:vanish — hidden text
  OnOffElement vanish = 17;

  // w:webHidden
  OnOffElement web_hidden = 18;

  // w:color
  DocxColor color = 19;

  // w:spacing — character spacing (DXA, can be negative)
  int32 spacing = 20;

  // w:w — character width as % of normal (50–200)
  int32 width_percent = 21;

  // w:kern — auto-kerning threshold (HPC; 0 = no auto-kern)
  int32 kern = 22;

  // w:position — vertical position (HPC; positive = raised, negative = lowered)
  int32 position = 23;

  // w:sz — font size (HPC)
  int32 sz = 24;

  // w:szCs — complex script font size (HPC)
  int32 sz_cs = 25;

  // w:highlight
  HighlightColor highlight = 26;

  // w:u — underline
  Underline underline = 27;

  // w:effect — text effect (glow, shadow, etc.)
  TextEffect effect = 28;

  // w:bdr — run border
  RunBorder border = 29;

  // w:shd — run shading
  DocxShading shading = 30;

  // w:fitText — fit text into a fixed width
  FitText fit_text = 31;

  // w:vertAlign — superscript/subscript
  VerticalAlignment vert_align = 32;

  // w:rtl — right-to-left run
  OnOffElement rtl = 33;

  // w:cs — complex script run
  OnOffElement cs = 34;

  // w:em — emphasis mark (East Asian)
  EmphasisMark em = 35;

  // w:lang — language
  Language lang = 36;

  // w:eastAsianLayout
  EastAsianLayout east_asian_layout = 37;

  // w:specVanish — paragraph mark special vanish
  OnOffElement spec_vanish = 38;

  // w:oMath — math run
  OnOffElement o_math = 39;

  // Change tracking for run properties (w:rPrChange)
  RunPropertiesChange rpr_change = 40;

  // w:del markup — run property is being deleted
  TrackedChangeInfo del = 41;
}

message RunPropertiesChange {
  int32 id = 1;
  string author = 2;
  string date = 3;
  RunProperties old_rpr = 4;
}

// w:rFonts
message RunFonts {
  string ascii = 1;
  string h_ansi = 2;
  string east_asia = 3;
  string cs = 4;
  FontHint hint = 5;
  string ascii_theme = 6;
  string h_ansi_theme = 7;
  string east_asia_theme = 8;
  string cs_theme = 9;
}

enum FontHint {
  FONT_HINT_DEFAULT = 0;
  FONT_HINT_EAST_ASIA = 1;
  FONT_HINT_CS = 2;
}

message DocxColor {
  // 0xRRGGBB or -1 for "auto"
  int32 rgb = 1;
  ThemeColor theme_color = 2;
  int32 theme_tint = 3;   // 0–255
  int32 theme_shade = 4;  // 0–255
}

enum HighlightColor {
  HIGHLIGHT_NONE = 0;
  HIGHLIGHT_BLACK = 1;
  HIGHLIGHT_BLUE = 2;
  HIGHLIGHT_CYAN = 3;
  HIGHLIGHT_DARK_BLUE = 4;
  HIGHLIGHT_DARK_CYAN = 5;
  HIGHLIGHT_DARK_GRAY = 6;
  HIGHLIGHT_DARK_GREEN = 7;
  HIGHLIGHT_DARK_MAGENTA = 8;
  HIGHLIGHT_DARK_RED = 9;
  HIGHLIGHT_DARK_YELLOW = 10;
  HIGHLIGHT_GREEN = 11;
  HIGHLIGHT_LIGHT_GRAY = 12;
  HIGHLIGHT_MAGENTA = 13;
  HIGHLIGHT_NONE_VALUE = 14;
  HIGHLIGHT_RED = 15;
  HIGHLIGHT_WHITE = 16;
  HIGHLIGHT_YELLOW = 17;
}

message Underline {
  UnderlineStyle val = 1;
  DocxColor color = 2;
  ThemeColor theme_color = 3;
}

enum UnderlineStyle {
  UNDERLINE_NONE = 0;
  UNDERLINE_SINGLE = 1;
  UNDERLINE_WORDS = 2;
  UNDERLINE_DOUBLE = 3;
  UNDERLINE_THICK = 4;
  UNDERLINE_DOTTED = 5;
  UNDERLINE_DOTTED_HEAVY = 6;
