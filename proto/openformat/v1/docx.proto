}

// w:del at paragraph level — runs/paragraphs being deleted
message TrackedChangeDeletion {
  TrackedChangeInfo info = 1;
  repeated ParagraphChild content = 2;
}

// w:moveFrom
message TrackedChangeMoveFrom {
  TrackedChangeInfo info = 1;
  repeated ParagraphChild content = 2;
}

// w:moveTo
message TrackedChangeMoveTo {
  TrackedChangeInfo info = 1;
  repeated ParagraphChild content = 2;
}

// w:moveFromRangeStart
message MoveFromRangeStart {
  int32 id = 1;
  string author = 2;
  string date = 3;
  string name = 4;
  int32 col_first = 5;
  int32 col_last = 6;
}

message MoveFromRangeEnd {
  int32 id = 1;
}

message MoveToRangeStart {
  int32 id = 1;
  string author = 2;
  string date = 3;
  string name = 4;
  int32 col_first = 5;
  int32 col_last = 6;
}

message MoveToRangeEnd {
  int32 id = 1;
}

// w:ins / w:del wrapping a run inside a paragraph — alias; uses TrackedChangeInfo
