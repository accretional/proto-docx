// ============================================================================
// NUMBERING (word/numbering.xml)
// ============================================================================

message Numbering {
  repeated AbstractNum abstract_nums = 1;
  repeated Num nums = 2;
  repeated NumberingPicBullet pic_bullets = 3;
}

message NumberingPicBullet {
  int32 num_pic_bullet_id = 1;
  Drawing drawing = 2;
}

// w:abstractNum — defines the formatting template
message AbstractNum {
  int32 abstract_num_id = 1;
  string nsid = 2;          // 8-digit hex namespace ID
  string multi_level_type = 3;  // "singleLevel", "multilevel", "hybridMultilevel"
  string tmpl = 4;          // 8-digit hex template code
  string name = 5;
  string style_link = 6;    // w:styleLink
  string num_style_link = 7; // w:numStyleLink
  repeated Level levels = 8;
}

// w:lvl — numbering level definition (0–8)
message Level {
  int32 ilvl = 1;

  // w:start — starting value
  int32 start = 2;

  // w:numFmt — numbering format
  NumberingFormat num_fmt = 3;

  // w:lvlRestart
  int32 lvl_restart = 4;

  // w:pStyle — associate with a paragraph style
  string pstyle = 5;

  // w:isLgl — legal numbering style (decimal override)
  bool is_lgl = 6;

  // w:suff — suffix after number (tab, space, nothing)
  LevelSuffix suff = 7;

  // w:lvlText — level text pattern (e.g., "%1.%2.")
  LevelText lvl_text = 8;

  // w:lvlJc
  JustificationValue lvl_jc = 9;

  // w:pPr
  ParagraphProperties ppr = 10;

  // w:rPr
  RunProperties rpr = 11;

  // w:lvlPicBulletId
  int32 lvl_pic_bullet_id = 12;

  // Level override (can be used inline in w:num)
  LevelOverride level_override = 13;
}

message LevelText {
  string val = 1;     // Pattern, e.g. "%1." or "•"
  bool null_value = 2;
}

enum LevelSuffix {
  LEVEL_SUFFIX_TAB = 0;
  LEVEL_SUFFIX_SPACE = 1;
  LEVEL_SUFFIX_NOTHING = 2;
}

// w:num — instance that references an abstractNum and can override levels
message Num {
  int32 num_id = 1;
  int32 abstract_num_id = 2;
  repeated LevelOverride lvl_overrides = 3;
}

message LevelOverride {
  int32 ilvl = 1;
  int32 start_override = 2;
  Level lvl = 3;   // Full level override
}

enum NumberingFormat {
  NUM_FMT_DECIMAL = 0;
  NUM_FMT_UPPER_ROMAN = 1;
  NUM_FMT_LOWER_ROMAN = 2;
  NUM_FMT_UPPER_LETTER = 3;
  NUM_FMT_LOWER_LETTER = 4;
