}

// Fill types
message NoFill {}

message SolidFill {
  oneof color {
    RgbColor rgb_clr = 1;
    SchemeColor scheme_clr = 2;
    SystemColor sys_clr = 3;
    PresetColor prst_clr = 4;
    HslColor hsl_clr = 5;
  }
}

message RgbColor {
  int32 val = 1;   // 0xRRGGBB
  repeated ColorTransform mods = 2;
}

message SchemeColor {
  SchemeColorVal val = 1;
  repeated ColorTransform mods = 2;
}

enum SchemeColorVal {
  SCHEME_COLOR_BG1 = 0;
  SCHEME_COLOR_TX1 = 1;
  SCHEME_COLOR_BG2 = 2;
  SCHEME_COLOR_TX2 = 3;
  SCHEME_COLOR_ACCENT1 = 4;
  SCHEME_COLOR_ACCENT2 = 5;
  SCHEME_COLOR_ACCENT3 = 6;
  SCHEME_COLOR_ACCENT4 = 7;
  SCHEME_COLOR_ACCENT5 = 8;
  SCHEME_COLOR_ACCENT6 = 9;
  SCHEME_COLOR_HLINK = 10;
  SCHEME_COLOR_FOLHLINK = 11;
  SCHEME_COLOR_PHCLR = 12;
  SCHEME_COLOR_DK1 = 13;
  SCHEME_COLOR_LT1 = 14;
  SCHEME_COLOR_DK2 = 15;
  SCHEME_COLOR_LT2 = 16;
}

message SystemColor {
  string val = 1;
  int32 last_clr = 2;
}

message PresetColor {
  string val = 1;
  repeated ColorTransform mods = 2;
}

