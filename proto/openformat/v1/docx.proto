  NUM_FMT_AIUEO_FULL_WIDTH = 20;
  NUM_FMT_IROHA_FULL_WIDTH = 21;
  NUM_FMT_DECIMAL_ZERO = 22;
  NUM_FMT_BULLET = 23;
  NUM_FMT_GANADA = 24;
  NUM_FMT_CHOSUNG = 25;
  NUM_FMT_DECIMAL_ENCLOSED_FULL_STOP = 26;
  NUM_FMT_DECIMAL_ENCLOSED_PAREN = 27;
