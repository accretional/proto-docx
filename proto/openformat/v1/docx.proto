// w:on / w:off pattern — many boolean attributes toggle between explicit true/false
// and "inherit from style". We use a tri-state to distinguish.
message OnOffElement {
  oneof state {
    bool on = 1;   // Explicit true (attribute present, val="1" or val="true")
    bool off = 2;  // Explicit false (attribute present, val="0" or val="false")
    // If neither is set, the attribute is absent (inherited)
  }
}

