  RECT_ALIGN_L = 3;
  RECT_ALIGN_CTR = 4;
  RECT_ALIGN_R = 5;
  RECT_ALIGN_BL = 6;
  RECT_ALIGN_B = 7;
  RECT_ALIGN_BR = 8;
}

