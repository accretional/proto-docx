  FOOTNOTE_SEPARATOR = 1;
  FOOTNOTE_CONTINUATION_SEPARATOR = 2;
  FOOTNOTE_CONTINUATION_NOTICE = 3;
}

enum EndnoteType {
  ENDNOTE_NORMAL = 0;
  ENDNOTE_SEPARATOR = 1;
  ENDNOTE_CONTINUATION_SEPARATOR = 2;
  ENDNOTE_CONTINUATION_NOTICE = 3;
}


// ============================================================================
// HEADERS & FOOTERS
// ============================================================================

message HeaderPart {
  string relationship_id = 1;
  repeated BlockLevelElement content = 2;
}

message FooterPart {
  string relationship_id = 1;
  repeated BlockLevelElement content = 2;
}


// ============================================================================
// DRAWING / IMAGES (w:drawing, DrawingML)
// ============================================================================

message Drawing {
  oneof placement {
    InlineDrawing inline = 1;
    AnchoredDrawing anchor = 2;
  }
}

// wp:inline
message InlineDrawing {
  int64 dist_t = 1;   // EMU — distance from text top
  int64 dist_b = 2;
  int64 dist_l = 3;
  int64 dist_r = 4;
  DrawingExtent extent = 5;
  DrawingEffectExtent effect_extent = 6;
  DrawingDocPr doc_pr = 7;
  DrawingGraphicFrameLocks graphic_frame_locks = 8;
  GraphicObject graphic = 9;
}

// wp:anchor
message AnchoredDrawing {
  int64 dist_t = 1;
  int64 dist_b = 2;
  int64 dist_l = 3;
  int64 dist_r = 4;
  bool simple_pos = 5;
  int32 relative_height = 6;
  bool behind_doc = 7;
  bool locked = 8;
  bool layout_in_cell = 9;
  bool hidden = 10;
  bool allow_overlap = 11;
  DrawingSimplePosition simple_position = 12;
  DrawingHorizontalPosition horizontal_position = 13;
  DrawingVerticalPosition vertical_position = 14;
  DrawingExtent extent = 15;
  DrawingEffectExtent effect_extent = 16;
  WrapType wrap = 17;
  DrawingDocPr doc_pr = 18;
  DrawingGraphicFrameLocks graphic_frame_locks = 19;
  GraphicObject graphic = 20;
}

message DrawingSimplePosition {
  int64 x = 1;   // EMU
  int64 y = 2;
}

message DrawingHorizontalPosition {
  HorizontalRelativeFrom relative_from = 1;
  oneof h_pos {
    HorizontalAlignment h_align = 2;
    int64 pos_offset = 3;     // EMU
    PctPosition pct = 4;
  }
}

message DrawingVerticalPosition {
  VerticalRelativeFrom relative_from = 1;
  oneof v_pos {
    VerticalAlignment v_align = 2;
    int64 pos_offset = 3;
    PctPosition pct = 4;
  }
}

message PctPosition {
  int32 pct = 1;   // Thousandths of a percent
