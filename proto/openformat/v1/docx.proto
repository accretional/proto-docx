}

message ColorTransform {
  oneof transform {
    int32 tint = 1;
    int32 shade = 2;
    int32 comp = 3;
    int32 inv = 4;
    int32 gray = 5;
    int32 alpha = 6;
    int32 alpha_mod = 7;
    int32 alpha_off = 8;
    int32 hueMod = 9;
    int32 hueOff = 10;
    int32 lumMod = 11;
    int32 lumOff = 12;
    int32 satMod = 13;
    int32 satOff = 14;
    int32 red = 15;
    int32 redMod = 16;
    int32 green = 17;
    int32 greenMod = 18;
    int32 blue = 19;
    int32 blueMod = 20;
    int32 gamma = 21;
    int32 inv_gamma = 22;
  }
}

