  bool default_unhide_when_used = 4;
  bool default_q_format = 5;
  int32 count = 6;
  repeated LsdException lsd_exceptions = 7;
}

message LsdException {
  string name = 1;
  bool locked = 2;
  int32 ui_priority = 3;
  bool semi_hidden = 4;
  bool unhide_when_used = 5;
  bool q_format = 6;
}

// w:style
message Style {
  StyleType type = 1;
  string style_id = 2;
  bool is_default = 3;
  bool custom_style = 4;

  // w:name
  string name = 5;

  // w:aliases
  repeated string aliases = 6;

  // w:basedOn
  string based_on = 7;

  // w:next
  string next = 8;

  // w:link — linked character/paragraph style
  string link = 9;

  // w:autoRedefine
  bool auto_redefine = 10;

  // w:hidden
  bool hidden = 11;

  // w:uiPriority
  int32 ui_priority = 12;

  // w:semiHidden
  bool semi_hidden = 13;

  // w:unhideWhenUsed
  bool unhide_when_used = 14;

  // w:qFormat — show in quick style gallery
  bool q_format = 15;

  // w:locked
  bool locked = 16;

  // w:personal / w:personalCompose / w:personalReply
  bool personal = 17;
  bool personal_compose = 18;
  bool personal_reply = 19;

  // w:rsid
  int32 rsid = 20;

  // w:pPr
  ParagraphProperties ppr = 21;

  // w:rPr
  RunProperties rpr = 22;

  // w:tblPr (for table styles)
  TableProperties tbl_pr = 23;

  // w:trPr (for table styles)
  TableRowProperties tr_pr = 24;

  // w:tcPr (for table styles)
  TableCellProperties tc_pr = 25;

