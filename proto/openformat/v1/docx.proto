  UNDERLINE_DASH_LONG_HEAVY = 10;
  UNDERLINE_DOT_DASH = 11;
  UNDERLINE_DOT_DASH_HEAVY = 12;
  UNDERLINE_DOT_DOT_DASH = 13;
  UNDERLINE_DOT_DOT_DASH_HEAVY = 14;
  UNDERLINE_WAVY = 15;
  UNDERLINE_WAVY_HEAVY = 16;
  UNDERLINE_WAVY_DOUBLE = 17;
}

enum TextEffect {
