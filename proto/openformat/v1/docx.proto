enum RubyAlignValue {
  RUBY_ALIGN_CENTER = 0;
  RUBY_ALIGN_DISTRIBUTE_LETTER = 1;
  RUBY_ALIGN_DISTRIBUTE_SPACE = 2;
  RUBY_ALIGN_LEFT = 3;
  RUBY_ALIGN_RIGHT = 4;
