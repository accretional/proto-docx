  }
  oneof fill {
    NoFill no_fill = 4;
    SolidFill solid_fill = 5;
    GradientFill grad_fill = 6;
    BlipFillProperty blip_fill = 7;
    PatternFill patt_fill = 8;
  }
  ShapeOutline ln = 9;
  ShapeEffectList effect_lst = 10;
}

message Transform2D {
  int32 rot = 1;      // 60000ths of a degree
  bool flip_h = 2;
  bool flip_v = 3;
  Point2D off = 4;
  PositiveSize2D ext = 5;
}

message Point2D {
  int64 x = 1;   // EMU
