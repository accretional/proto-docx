  TEXT_EFFECT_NONE = 0;
  TEXT_EFFECT_BLINKING_BACKGROUND = 1;
  TEXT_EFFECT_LIGHTS = 2;
  TEXT_EFFECT_ANTSBLACK = 3;
  TEXT_EFFECT_ANTSRED = 4;
