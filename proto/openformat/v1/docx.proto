  BB_INSERT_PG = 2;
}

// ============================================================================
// EXTENDED DOCUMENT WRAPPER
// ============================================================================

// DocxDocumentWithMetadata is the primary transport type for DOCX documents
// in the OpenFormat service.  raw_bytes carries the verbatim source ZIP bytes
// for round-trip Encode calls, mirroring PdfDocument.raw_bytes and
// XmlDocumentWithMetadata.raw_bytes.
message DocxDocumentWithMetadata {
  // The fully-parsed DOCX package structure.
  Package docx_package = 1;

  // Total paragraph count across the document body.
  int32 paragraph_count = 2;

  // Total image/media part count in the package.
  int32 image_count = 3;

  // Total font references from word/fontTable.xml.
  int32 font_count = 4;

  // True if the document has tracked changes (insertions or deletions).
  bool has_tracked_changes = 5;

  // True if the document has comments.
  bool has_comments = 6;

  // True if the document has footnotes or endnotes.
  bool has_notes = 7;

  // Raw ZIP source bytes — always set by Decode; required by Encode for round-trip.
  bytes raw_bytes = 100;
}
